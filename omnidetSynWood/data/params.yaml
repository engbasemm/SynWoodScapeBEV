################################
# -- TRAIN --
################################
# choices:                      [distance, semantic, motion, detection,compression
#                                distance_semantic, detection_semantic, distance_semantic_motion,
#                                distance_semantic_detection, distance_semantic_detection_motion]
train: bev #compression_semantic_detection_bev #bev #compression #distance_semantic_detection_motion
dataset_dir: ../../SynWoodScapePrj/omnidet/SynWoodscape2021/
rgb_images: rgb_images
train_file: data/train.txt
val_file: data/val.txt
test_file: data/test_org.txts

# Path to save images, model weights of training
output_directory: ../../SynWoodScapePrj/omnidet/SynWoodscape2021/output/

################################
# -- MODEL CONFIGS --
################################
model_name: res50_bev_decoder_stitcher_compression_self_attn_aux_hyperprior_v1
#model_name: res50_cheng_attn0.08_FR_2Classes_yolo7_dbg128_conf30_greedNMS_mtl_regul_0.1_Clssloss1 #compression_cheng_atten_decoder_FR_3Classes_q2_RD0_13   # Writers will be written based on the model name
comprae_vvc_hevc_jpeg2000: True
dataset: synwoodscape_raw          # woodscape_raw: FV (544 x 288) (1088 x 576)
fishey8k_dataset_enable: True
fishey8k_dataset_dir: fisheye8K/
fishey8k_val_file: data/val_fisheye8K.txt
input_height: 288               # network input height choose from the above options
input_width: 544                # network input width choose from the above options
discard_mirrors: True
use_amp: True
use_checkpointing: False
loss_alpha: 0.85
bev_loss_scale: 100.0
accumulation_steps: 8
grad_clip: 1.0
################################
fusion_out_channels: 256        # Output channels for the BEV fusion module
strides: [16, 32]               # Strides of the encoder features used for BEV
network_layers: 50              # Number of layers in resnet encoder arch [18, 50]
pose_network_layers: 18         # Number of layers for posenet encoder in resnet arch [18, 50]
frame_idxs: [0, -1]             # frames to load in temporal order [t, t-1]
pose_model_type: separate       # shared or separate encoder for posenet [shared, separate]
pose_model_input: pairs         # how many images the pose network gets [pairs, all]
rotation_mode: euler            # [euler, quat] euler (yaw,pitch,roll) or quat (last 3 coefficients)
num_scales: 4                   # Number of scales for the input dyadic pyramid image
crop: True                     # if set, crops the car hood appropriately for all the datasets
disable_auto_mask: False        # if set, disables the dynamic mask
ego_mask: True                  # out of bound mask according to vid2depth
enable_compression: True
compression_quality : 8         #0 , 4, 8 ( 0: lowest quality , 8:Highest Quality)
compression_decoder:  chengAttenDecoder #factorizedPriorDecoder # # #unet #VAEAutoencoder #VAEAutoencoder #factorized_prior #VAEAutoencoder #factorizedPriorDecoder #unet or resnset_in_64 or resnet_in_512 or resnet_in_256 or factorized_prior or factorizedPriorDecoder or ScaleHyperpriorDecoder
train_cifar_compression : False
load_compression_model : False
dl_compress_decompress : False
debug_bev_step: 0
# Factorized params
enable_reconstruction_feature_quant: true
num_quant_bits_reconstruction: 8
debug_reconstruction_quantization: true
# Add this block to your main config.yaml file
enable_multiprocessing: true
bev_h: 120
bev_w: 240
weight_decay: 0.001
lambda_bev: 1.0                # Weight for the BEV stitching loss
lambda_comp: 0.5               # Weight for the compression/reconstruction loss

################################
# --CompressionPrior --
################################
compression_prior_num_classes: 10        # Number of classes to predict
compression_prior_loss: focal_loss       # choices: [cross_entropy, focal_loss]
compression_prior_class_weighting: woodscape_enet # [woodscape_enet, woodscape_mfb ]
################################
# --Compression --
################################
compression_num_classes: 10        # Number of classes to predict
compression_loss: focal_loss       # choices: [cross_entropy, focal_loss]
compression_class_weighting: woodscape_enet # [woodscape_enet, woodscape_mfb ]


################################
# --Autoencoder --
################################
Autoencoder_num_classes: 10        # Number of classes to predict
Autoencoder_loss: focal_loss       # choices: [cross_entropy, focal_loss]
Autoencoder_class_weighting: woodscape_enet # [woodscape_enet, woodscape_mfb ]

################################
# --VAE --
################################
vae_num_classes: 10        # Number of classes to predict
vae_loss: focal_loss       # choices: [cross_entropy, focal_loss]
vae_class_weighting: woodscape_enet # [woodscape_enet, woodscape_mfb ]

#############################################
# -- DISTANCE ESTIMATION LOSS WEIGHT FACTORS --
#############################################
reconstr_weight: 0.15           # L1 loss weight
ssim_weight: 0.85               # Photometric loss weight
smooth_weight: 0.001            # Smoothness loss weight
clip_loss_weight: 0.5           # Clip loss weight

################################
# --SEMANTIC & MOTION--
################################
semantic_num_classes: 10        # Number of classes to predict
semantic_loss: focal_loss       # choices: [cross_entropy, focal_loss]
semantic_class_weighting: woodscape_enet # [woodscape_enet, woodscape_mfb ]

motion_class_weighting: motion_enet  # [motion_enet, motion_mfb ]
motion_loss: focal_loss              # choices: [cross_entropy, focal_loss]
siamese_net: True                    # if set uses siamese net which takes single frame t, t+1 and shared encoder

#############################
# --DETECTION--
#############################
num_classes_detection: 2    # should be set according to number of classes in the data-set
classes_names: ['four-wheeler vehicle', 'pedestrian'] #['vehicles', 'person', 'bicycle', 'traffic_sign', 'traffic_light']
detection_conf_thres: 0.5 #0.3 #0.4
detection_nms_thres: 0.2 #0.3 #0.2
min_vehicle_area: 1000
min_person_area: 400
# The anchors should be updated according to the training data-set using generate_anchors.py ( obselete)
#anchors1: [[ 20 , 32] , [ 35 , 56], [ 37 , 26]]
#anchors2: [[ 68 , 50] , [ 69 , 106] , [134 , 87]]
#anchors3: [[164 , 176] ,  [311 , 255] ,  [619 , 441]]

#origial - Yolo v3
#anchors1: [[24, 45], [28, 24], [50, 77] ]
#anchors2: [[52, 39], [92, 145], [101, 69]]
#anchors3: [[52, 39], [92, 145], [101, 69]]

anchor_t: 0.4
ignore_thres: 0.5
#yolo5
#COCO Dataset
#anchors1: [12,16, 19,36, 40,28]  # P3/8
#anchors2: [36,75, 76,55, 72,146]  # P4/16
#anchors3: [142,110, 192,243, 459,401]  # P5/32

#yolo7 woodscape Dataset - original 1
#anchors1 : [[116,90], [156,198], [373,326]]  # Assign the first set to the first head (P3)
#anchors2 : [[30,61], [62,45], [59,119]] # Assign the second set to the second head (P4_bu)
#anchors3 :  [[10,13], [16,30], [33,23]] # Assign the third set to the third head (P5_bu)


#test 2
#anchors1: [[10,13], [16,30], [33,23]] # Assign the third set to the third head (P5_bu)
#anchors2: [[30,61], [62,45], [59,119]] # Assign the second set to the second head (P4_bu)
#anchors3: [[116,90], [156,198], [373,326]]  # Assign the first set to the first head (P3)

#test 3
#anchors3: [[106, 152] , [207, 160] , [419, 247]]
#anchors2: [[62, 46] , [52, 103] , [119, 71]]
#anchors1: [[15, 22] , [34, 27] , [21, 64]]

anchors3: [
  [15, 21] ,
  [35, 27] ,
  [21, 63]]

anchors2: [
  [63, 46] ,
  [51, 102] ,
  [121, 72]]

anchors1: [
  [104, 153] ,
  [206, 160] ,
  [418, 247]]

debug_decoder: False
debug_mode: False
debug_nms: False
neck_sppcspc_channels : 512
neck_bifpn_p4_channels : 512
neck_bifpn_p3_channels : 256
use_neck_cbam : True  # Example: Enable CBAM in neck
use_bifpn_cbam : True  # Example: Enable CBAM inside BiFPN blocks specifically
current_epoch: 0
current_step: 0
lambda_coord: 1.0
object_scale: 1.0
no_object_scale: 1.0 #100.0
cls_loss_scale: 0.5 #1.0
iou_loss_scale: 0.
#neck_sppf_c2: 512
neck_sppf_out_channels: 512
neck_emb0_f0: 512
neck_emb0_f1: 512
neck_p5_to_p4_conv_out_channels: 256
neck_cbl1_out: 256
neck_cbl2_out: 128
neck_ds1_out: 640
neck_c2f_pan1_out: 1280
neck_ds2_out: 1280
neck_c2f_pan2_out: 2048
neck_emb1_f0: 256
neck_emb1_f1: 256
neck_p4_to_p3_conv_out_channels: 128
neck_emb2_f0: 640
neck_emb2_f1: 640
neck_pan_p3_downsample_out_channels: 256
neck_pan_p4_c2f_out_channels: 1280
neck_pan_p4_downsample_out_channels: 512
neck_pan_p5_c2f_out_channels: 2048
#v12
neck_sppf_c2: 1024
neck_fpn_p5_out: 1024
neck_conv_p5_to_p4_ch: 512
neck_fpn_p4_out: 512
neck_conv_p4_to_p3_ch: 256
neck_pan_p3_ds_ch: 320
neck_pan_p4_ds_ch: 640


neck_p3_head_input_channels: 640
neck_p4_head_input_channels: 1280
neck_p5_head_input_channels: 2048
# Control attention
use_attention: false # or false for debugging
use_cross_scale_attention: False # or true if you want to test it
sppf_c2: 512
neck_p5_to_p4_branch: 256
neck_p4_to_p3_branch: 256
neck_fpn_p3_out: 256
neck_pan_p3_ds: 256
neck_pan_p4_out: 512
neck_pan_p4_ds: 512
neck_pan_p5_out: 512
neck_fpn_p3_head_input_channels: 640

#############################
# -- TRAIN OPTIONS --
#############################
batch_size: 3               # training size of the model
num_workers: 6                # Data loader workers
epochs: 300                   # number of epochs
learning_rate: 0.0001         # learning rate of the model
scheduler_step_size: [100, 110] # step size of the scheduler
min_distance: 0.1             # scales sigmoid output in the range [0, 1] to a minimum distance value
max_distance: 100.0           # scales sigmoid output in the range [0, 1] to a maximum distance value

#############################
# -- LOGGING OPTIONS --
#############################
log_frequency: 100           # number of batches between each tensorboard log
val_frequency: 100           # step frequency at which validation takes place
save_frequency: 20           # number of epochs between each save

#############################
# -- Class_weights.py --
#############################
weighing: enet               # choices = [mfb, enet] weighing technique for generating class weights
num_classes: 10

###########################
# -- PRE_TRAINED CONFIG --
###########################
# Pre-trained weights folder path of trained models to resume training and for testing
# /path/to/the/pre-trained/weights/res18
pretrained_weights: #pretrained_models/MyModel/MTL_bitrates/ #pretrained_models/MyModel/MTL/ #/media/basem/Collection/Work/Academic/PHDWork/PHD_Topics/MTL/ValeoMTL/WoodScapeGit/omnidet/pretrained_models/MyModel/MTL/  #/res50/ #

# choices: ["encoder", "norm", "pose_encoder", "pose", "semantic", "motion", "detection"]
models_to_load: ["encoder", "detection","semantic"]

##############################
# -- ONNX MODEL EXPORT --
##############################
# choices:                    [normnet, semantic, motion, detection, omnidet, posenet]
onnx_model: omnidet           # choose a specific model from above to export onnx model
opset_version: 12             # onnx 1.10.1
model_summary: True           # if set, prints keras type in-detail model summary
init_weights: True            # if set, inits pre-trained weights for the ONNX graph
video_name: norm              # name of the video for qualitative analysis

# trained model weights path to create the onnx model
# /path/to/the/pre-trained/weights/res18
model_path:
# /path/to/save/onnx-model/export/
onnx_export_path:

# load the onnx model and verify the output using verify_onnx_models
# /path/to/saved/onnx-model/export/res18/onnx/omnidet_float32_opset12.onnx
onnx_load_model:

####################################################
# -- CUDA --
#############################
device: 'cuda:0'             # choose cpu or cuda:0 device
cuda_visible_devices: "0"    # To forcefully run the model on CPU set -1 else set string value to 0
use_multiple_gpu: False      # Data parallelism
########################################################################################################################
