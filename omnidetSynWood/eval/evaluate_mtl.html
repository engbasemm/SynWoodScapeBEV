        function getCodecCategory(name) {
            if (name.includes("HEVC")) return 'HEVC';
            if (name.includes("JPEG2000")) return 'JPEG2000';
            if (name.includes("ChengAtten")) return 'ChengAtten DL Model';
            if (name.includes("Factorized")) return 'Factorized DL Model';
            return 'Unknown';

        // Define plotting parameters
        const SVG_WIDTH = 800;
        const SVG_HEIGHT = 450;
        const MARGIN = { top: 40, right: 40, bottom: 60, left: 70 };
        const PLOT_WIDTH = SVG_WIDTH - MARGIN.left - MARGIN.right;
        const PLOT_HEIGHT = SVG_HEIGHT - MARGIN.top - MARGIN.bottom;

        function drawMarker(plotGroup, type, x, y, size, fill, stroke, strokeWidth) {
            if (type === 'circle') {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", x);
                circle.setAttribute("cy", y);
                circle.setAttribute("r", size);
                circle.setAttribute("fill", fill);
                circle.setAttribute("stroke", stroke);
                circle.setAttribute("stroke-width", strokeWidth);
                plotGroup.appendChild(circle);
            } else if (type === 'square') {
                const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                const halfSize = size / Math.sqrt(2); // For similar visual size to circle
                rect.setAttribute("x", x - halfSize);
                rect.setAttribute("y", y - halfSize);
                rect.setAttribute("width", size * Math.sqrt(2));
                rect.setAttribute("height", size * Math.sqrt(2));
                rect.setAttribute("fill", fill);
                rect.setAttribute("stroke", stroke);
                rect.setAttribute("stroke-width", strokeWidth);
                plotGroup.appendChild(rect);
            } else if (type === 'triangle') {
                const triangleHeight = size * 2;
                const triangleBase = size * 2 * Math.sqrt(3) / 2; // Equilateral triangle
                const points = `${x},${y - triangleHeight / 2} ${x - triangleBase / 2},${y + triangleHeight / 2} ${x + triangleBase / 2},${y + triangleHeight / 2}`;
                const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                polygon.setAttribute("points", points);
                polygon.setAttribute("fill", fill);
                polygon.setAttribute("stroke", stroke);
                polygon.setAttribute("stroke-width", strokeWidth);
                plotGroup.appendChild(polygon);
            } else if (type === 'diamond') {
                const halfSize = size * 1.5;
                const points = `${x},${y - halfSize} ${x + halfSize},${y} ${x},${y + halfSize} ${x - halfSize},${y}`;
                const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                polygon.setAttribute("points", points);
                polygon.setAttribute("fill", fill);
                polygon.setAttribute("stroke", stroke);
                polygon.setAttribute("stroke-width", strokeWidth);
                plotGroup.appendChild(polygon);
            } else if (type === 'cross') { // New marker for 'cross'
                const line1 = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line1.setAttribute("x1", x - size);
                line1.setAttribute("y1", y - size);
                line1.setAttribute("x2", x + size);
                line1.setAttribute("y2", y + size);
                line1.setAttribute("stroke", fill); // Use fill color for stroke
                line1.setAttribute("stroke-width", strokeWidth * 2); // Make it a bit thicker
                plotGroup.appendChild(line1);

                const line2 = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line2.setAttribute("x1", x - size);
                line2.setAttribute("y1", y + size);
                line2.setAttribute("x2", x + size);
                line2.setAttribute("y2", y - size);
                line2.setAttribute("stroke", fill);
                line2.setAttribute("stroke-width", strokeWidth * 2);
                plotGroup.appendChild(line2);
            }
        }

            svg.classList.add("plot-svg");

            tooltip.setAttribute("id", tooltipId);
            tooltip.classList.add("tooltip");
            parentDiv.appendChild(tooltip);

            const dataset = plotData.datasets[datasetName];
            if (!dataset) {
                console.error(`Dataset ${datasetName} not found.`);
                return;
            }

            let dataToPlot = [];
            let baselineValue = null;
            let baselineName = null;

            if (plotType === 'quality') { // PSNR, MS-SSIM, MSE vs BPP
                dataset.traditional_codecs.forEach(d => {
                    if (d.BPP !== null && !isNaN(d.BPP) && d[yMetricKey] !== null && !isNaN(d[yMetricKey])) {
                        dataToPlot.push({
                            name: d.Codec,
                            bpp: d.BPP,
                            yValue: d[yMetricKey],
                            category: getCodecCategory(d.Codec)
                        });
                    }
                });
                dataset.dl_models.forEach(d => {
                    // Exclude all "Factorized" models from quality plots
                    if (d['Model Name'] !== "RES50_Baseline_no_compression" && !d['Model Name'].includes("Factorized") && d.BPP !== null && !isNaN(d.BPP) && d[yMetricKey] !== null && !isNaN(d[yMetricKey])) {
                        dataToPlot.push({
                            name: d['Model Name'],
                            bpp: d.BPP,
                            yValue: d[yMetricKey],
                            category: getCodecCategory(d['Model Name']) // Assign specific DL category
                        });
                    }
                });
            } else if (plotType === 'task') { // mAP, mIoU vs BPP
                const baselineModel = dataset.dl_models.find(d => d['Model Name'] === "RES50_Baseline_no_compression");
                if (baselineModel && baselineModel[yMetricKey] !== null && !isNaN(baselineModel[yMetricKey])) {
                    baselineValue = baselineModel[yMetricKey];
                    baselineName = baselineModel['Model Name'];
                }

                dataset.dl_models.forEach(d => {
                    // Exclude "Model_AA_Factorized" from task plots (as per previous request)
                    if (d['Model Name'] !== "RES50_Baseline_no_compression" && d['Model Name'] !== "Model_AA_Factorized" && d.BPP !== null && !isNaN(d.BPP) && d[yMetricKey] !== null && !isNaN(d[yMetricKey])) {
                        dataToPlot.push({
                            name: d['Model Name'],
                            bpp: d.BPP,
                            yValue: d[yMetricKey],
                            category: getCodecCategory(d['Model Name']) // Assign specific DL category
                        });
                    }
                });
            }

            // Filter out null or NaN BPP values for min/max calculation
            const validBPPs = dataToPlot.map(d => d.bpp).filter(b => b !== null && !isNaN(b));
            const validYValues = dataToPlot.map(d => d.yValue).filter(y => y !== null && !isNaN(y));

            // Add baseline value to Y values for scaling if it exists
            if (baselineValue !== null && !isNaN(baselineValue)) {
                validYValues.push(baselineValue);
            }

            if (validBPPs.length === 0 || validYValues.length === 0) {
                console.warn(`No valid data to plot for ${datasetName} - ${yMetricKey} (${plotType}).`);
                svg.innerHTML = `<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="16px" fill="#777">No data available for this plot.</text>`;
                return;
            }

            const minBPP = Math.min(...validBPPs);
            const maxBPP = Math.max(...validBPPs);
            const minY = Math.min(...validYValues);
            const maxY = Math.max(...validYValues);

            // Adjust ranges slightly for padding on the graph
            const paddingFactorBPP = (maxBPP - minBPP) * 0.1;
            const paddedMinBPP = Math.max(0, minBPP - paddingFactorBPP);
            const paddedMaxBPP = maxBPP + paddingFactorBPP;

            const paddingFactorY = (maxY - minY) * 0.1;
            const paddedMinY = minY - paddingFactorY;
            const paddedMaxY = maxY + paddingFactorY;

            // Handle cases where range is zero (e.g., all BPPs are the same)
            const rangeBPP = paddedMaxBPP - paddedMinBPP;
            const rangeY = paddedMaxY - paddedMinY;

            const scaleX = (value) => MARGIN.left + (value - paddedMinBPP) / (rangeBPP === 0 ? 1 : rangeBPP) * PLOT_WIDTH;
            const scaleY = (value) => MARGIN.top + PLOT_HEIGHT - (value - paddedMinY) / (rangeY === 0 ? 1 : rangeY) * PLOT_HEIGHT;

            // Group for plot elements
            const plotGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            plotGroup.setAttribute("transform", `translate(0,0)`);
            svg.appendChild(plotGroup);

            // Add X-axis
            const xAxisGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            xAxisGroup.setAttribute("transform", `translate(0, ${MARGIN.top + PLOT_HEIGHT})`);
            plotGroup.appendChild(xAxisGroup);

            const xAxisLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
            xAxisLine.setAttribute("x1", MARGIN.left);
            xAxisLine.setAttribute("y1", 0);
            xAxisLine.setAttribute("x2", MARGIN.left + PLOT_WIDTH);
            xAxisLine.setAttribute("y2", 0);
            xAxisLine.setAttribute("stroke", "#555");
            xAxisGroup.appendChild(xAxisLine);

            // X-axis ticks
            const numXTicks = 5;
            for (let i = 0; i <= numXTicks; i++) {
                const bppValue = paddedMinBPP + (paddedMaxBPP - paddedMinBPP) * (i / numXTicks);
                const xPos = scaleX(bppValue);
                const tickLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                tickLine.setAttribute("x1", xPos);
                tickLine.setAttribute("y1", 0);
                tickLine.setAttribute("x2", xPos);
                tickLine.setAttribute("y2", 6);
                tickLine.setAttribute("stroke", "#777");
                xAxisGroup.appendChild(tickLine);

                const tickLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
                tickLabel.setAttribute("x", xPos);
                tickLabel.setAttribute("y", 20);
                tickLabel.setAttribute("text-anchor", "middle");
                tickLabel.classList.add("tick-label");
                tickLabel.textContent = bppValue.toFixed(2);
                xAxisGroup.appendChild(tickLabel);

                // Vertical grid lines
                const gridLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                gridLine.setAttribute("x1", xPos);
                gridLine.setAttribute("y1", -PLOT_HEIGHT);
                gridLine.setAttribute("x2", xPos);
                gridLine.setAttribute("y2", 0);
                gridLine.classList.add("grid-line");
                xAxisGroup.appendChild(gridLine);
            }

            // X-axis label
            const xAxisLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
            xAxisLabel.setAttribute("x", MARGIN.left + PLOT_WIDTH / 2);
            xAxisLabel.setAttribute("y", SVG_HEIGHT - 10);
            xAxisLabel.setAttribute("text-anchor", "middle");
            xAxisLabel.classList.add("axis-label");
            xAxisLabel.textContent = "BPP";
            svg.appendChild(xAxisLabel);

            // Add Y-axis
            const yAxisGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            yAxisGroup.setAttribute("transform", `translate(${MARGIN.left}, 0)`);
            plotGroup.appendChild(yAxisGroup);

            const yAxisLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
            yAxisLine.setAttribute("x1", 0);
            yAxisLine.setAttribute("y1", MARGIN.top);
            yAxisLine.setAttribute("x2", 0);
            yAxisLine.setAttribute("y2", MARGIN.top + PLOT_HEIGHT);
            yAxisLine.setAttribute("stroke", "#555");
            yAxisGroup.appendChild(yAxisLine);

            // Y-axis ticks
            const numYTicks = 5;
            for (let i = 0; i <= numYTicks; i++) {
                const yValue = paddedMinY + (paddedMaxY - paddedMinY) * (i / numYTicks);
                const yPos = scaleY(yValue);
                const tickLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                tickLine.setAttribute("x1", 0);
                tickLine.setAttribute("y1", yPos - MARGIN.top);
                tickLine.setAttribute("x2", -6);
                tickLine.setAttribute("y2", yPos - MARGIN.top);
                tickLine.setAttribute("stroke", "#777");
                yAxisGroup.appendChild(tickLine);

                const tickLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
                tickLabel.setAttribute("x", -10);
                tickLabel.setAttribute("y", yPos - MARGIN.top + 4);
                tickLabel.setAttribute("text-anchor", "end");
                tickLabel.classList.add("tick-label");
                tickLabel.textContent = yValue.toFixed(yMetricKey === 'MS_SSIM' || yMetricKey === 'MSE' ? 5 : 2);
                yAxisGroup.appendChild(tickLabel);

                // Horizontal grid lines
                const gridLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                gridLine.setAttribute("x1", 0);
                gridLine.setAttribute("y1", yPos - MARGIN.top);
                gridLine.setAttribute("x2", PLOT_WIDTH);
                gridLine.setAttribute("y2", yPos - MARGIN.top);
                gridLine.classList.add("grid-line");
                yAxisGroup.appendChild(gridLine);
            }

            // Y-axis label
            const yAxisLabelText = document.createElementNS("http://www.w3.org/2000/svg", "text");
            yAxisLabelText.setAttribute("x", -(MARGIN.top + PLOT_HEIGHT / 2));
            yAxisLabelText.setAttribute("y", MARGIN.left - 40);
            yAxisLabelText.setAttribute("transform", "rotate(-90)");
            yAxisLabelText.setAttribute("text-anchor", "middle");
            yAxisLabelText.classList.add("axis-label");
            yAxisLabelText.textContent = yAxisLabel;
            svg.appendChild(yAxisLabelText);

            // Group data by category for drawing curves
            const dataByCategory = dataToPlot.reduce((acc, d) => {
                if (!acc[d.category]) {
                    acc[d.category] = [];
                }
                acc[d.category].push(d);
                return acc;
            }, {});

            // Plot curves and data points
            for (const category in dataByCategory) {
                const categoryData = dataByCategory[category].sort((a, b) => a.bpp - b.bpp); // Sort by BPP for lines

                // Draw lines (only for categories that should have lines)
                if (category === 'HEVC' || category === 'JPEG2000' || category === 'ChengAtten DL Model' || category === 'Factorized DL Model') {
                    const polyline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
                    const points = categoryData.map(d => `${scaleX(d.bpp)},${scaleY(d.yValue)}`).join(" ");
                    polyline.setAttribute("points", points);
                    polyline.setAttribute("fill", "none");
                    polyline.setAttribute("stroke", colors[category]);
                    polyline.setAttribute("stroke-width", 2);
                    plotGroup.appendChild(polyline);
                }

                // Draw markers and add tooltips
                categoryData.forEach(d => {
                    const x = scaleX(d.bpp);
                    const y = scaleY(d.yValue);

                    drawMarker(plotGroup, markers[d.category], x, y, 5, colors[d.category], 'rgba(0,0,0,0.2)', 1);

                    // Tooltip events
                    const targetElement = plotGroup.lastChild; // The last drawn marker
                    targetElement.onmouseover = (event) => {
                        tooltip.style.opacity = 1;
                        tooltip.innerHTML = `<strong>${d.name} (${d.category})</strong><br>Dataset: ${datasetName}<br>BPP: ${d.bpp.toFixed(3)}<br>${yAxisLabel}: ${d.yValue.toFixed(yMetricKey === 'MS_SSIM' || yMetricKey === 'MSE' ? 5 : 2)}`;
                        tooltip.style.left = `${event.pageX + 10}px`;
                        tooltip.style.top = `${event.pageY + 10}px`;
                    };
                    targetElement.onmousemove = (event) => {
                        tooltip.style.left = `${event.pageX + 10}px`;
                        tooltip.style.top = `${event.pageY + 10}px`;
                    };
                    targetElement.onmouseout = () => {
                        tooltip.style.opacity = 0;
                    };
                });
            }

            // Draw Baseline if applicable
            if (plotType === 'task' && baselineValue !== null && !isNaN(baselineValue)) {
                const yBaseline = scaleY(baselineValue);
                const baselineLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                baselineLine.setAttribute("x1", scaleX(paddedMinBPP));
                baselineLine.setAttribute("y1", yBaseline);
                baselineLine.setAttribute("x2", scaleX(paddedMaxBPP));
                baselineLine.setAttribute("y2", yBaseline);
                baselineLine.setAttribute("stroke", colors['Baseline']);
                baselineLine.setAttribute("stroke-width", 2);
                baselineLine.setAttribute("stroke-dasharray", "5,5"); // Dashed line for baseline
                plotGroup.appendChild(baselineLine);

                // Add label for baseline
                const baselineLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
                baselineLabel.setAttribute("x", scaleX(paddedMaxBPP) + 5);
                baselineLabel.setAttribute("y", yBaseline + 5);
                baselineLabel.setAttribute("font-size", "12px");
                baselineLabel.setAttribute("fill", colors['Baseline']);
                baselineLabel.textContent = `${baselineName}: ${baselineValue.toFixed(yMetricKey === 'mAP' || yMetricKey === 'mIoU' ? 4 : 2)}`;
                plotGroup.appendChild(baselineLabel);
            }

            // Add Legend
            // Clear existing legend first if any associated with the parentDiv
            let existingLegend = parentDiv.querySelector('.legend');
            if (existingLegend) {
                existingLegend.remove();
            }
            const legendDiv = document.createElement('div');
            legendDiv.classList.add('legend');
            parentDiv.appendChild(legendDiv);

            const categoriesInPlot = new Set(dataToPlot.map(d => d.category));
            if (plotType === 'task' && baselineValue !== null) {
                categoriesInPlot.add('Baseline');
            }

            for (const category of Object.keys(colors)) {
                if (categoriesInPlot.has(category)) {
                    const legendItem = document.createElement('div');
                    legendItem.classList.add('legend-item');
                    const markerSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                    markerSvg.setAttribute("width", "20");
                    markerSvg.setAttribute("height", "20");
                    drawMarker(markerSvg, markers[category], 10, 10, 5, colors[category], 'rgba(0,0,0,0.1)', 1);
                    legendItem.appendChild(markerSvg);
                    const span = document.createElement('span');
                    span.textContent = category;
                    legendItem.appendChild(span);
                    legendDiv.appendChild(legendItem);
                }
            }
        }


        // Create the plots on window load
        window.onload = () => {
            loadPlotData(); // Load data first
            const plotsContainer = document.getElementById('plots-container');

            for (const datasetName in plotData.datasets) {
                const datasetSection = document.createElement('div');
                datasetSection.classList.add('dataset-section');
                plotsContainer.appendChild(datasetSection);

                const datasetTitle = document.createElement('h2');
                datasetTitle.classList.add('dataset-title');
                datasetTitle.textContent = `Dataset: ${datasetName}`;
                datasetSection.appendChild(datasetTitle);

                // Quality Metrics Plots (PSNR, MS-SSIM, MSE)
                const qualityPlotDiv = document.createElement('div');
                qualityPlotDiv.classList.add('plot-section');
                qualityPlotDiv.id = `quality-plot-container-${datasetName.replace(/\s/g, '_')}`; // Assign unique ID
                datasetSection.appendChild(qualityPlotDiv);

                const qualityPlotTitle = document.createElement('h3');
                qualityPlotTitle.classList.add('plot-subsection-title');
                qualityPlotTitle.textContent = `Quality Metrics (PSNR, MS-SSIM, MSE) vs BPP`;
                qualityPlotDiv.appendChild(qualityPlotTitle);

                createPlot(qualityPlotDiv.id, 'PSNR', 'PSNR', `psnr-tooltip-${datasetName}`, datasetName, 'quality');
                createPlot(qualityPlotDiv.id, 'MS-SSIM', 'MS_SSIM', `msssim-tooltip-${datasetName}`, datasetName, 'quality');
                createPlot(qualityPlotDiv.id, 'MSE', 'MSE', `mse-tooltip-${datasetName}`, datasetName, 'quality');


                // Task Metrics Plots (mAP, mIoU) - only if data exists
                const hasTaskMetrics = plotData.datasets[datasetName].dl_models.some(d => d.mAP !== null || d.mIoU !== null);
                if (hasTaskMetrics) {
                    const taskPlotDiv = document.createElement('div');
                    taskPlotDiv.classList.add('plot-section');
                    taskPlotDiv.id = `task-plot-container-${datasetName.replace(/\s/g, '_')}`;
                    datasetSection.appendChild(taskPlotDiv);

                    const taskPlotTitle = document.createElement('h3');
                    taskPlotTitle.classList.add('plot-subsection-title');
                    taskPlotTitle.textContent = `Task Metrics (mAP, mIoU) vs BPP`;
                    taskPlotDiv.appendChild(taskPlotTitle);

                    createPlot(taskPlotDiv.id, 'mAP', 'mAP', `map-tooltip-${datasetName}`, datasetName, 'task');
                    createPlot(taskPlotDiv.id, 'mIoU', 'mIoU', `miou-tooltip-${datasetName}`, datasetName, 'task');
                }
            }
        };
    </script>
</body>
</html>
